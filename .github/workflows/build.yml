name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact: macos-arm64
            bundles: app,dmg
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact: macos-intel
            bundles: app,dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
            bundles: nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build application
        run: pnpm exec tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: pet-xiaoxinzi-${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*
